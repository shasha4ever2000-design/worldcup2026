# Cloudflare Pages + Workers config for the World Cup 2026 hub.
# The static site (index.html, etc.) is served from the repo root; the
# functions/ directory becomes serverless API routes (/api/*).
#
# First-time setup (see CONNECT.md for the full walkthrough):
#   1. npx wrangler login
#   2. npx wrangler kv namespace create WC_CACHE   # paste the id below
#   3. npx wrangler pages secret put ANTHROPIC_API_KEY
#   4. npm run cf:deploy

name = "worldcup2026"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Static assets live at the repo root.
pages_build_output_dir = "."

# KV namespace used to cache AI output (previews/recaps) and live scores so we
# never pay for the same generation twice. Create it with the command above and
# replace the placeholder id.
[[kv_namespaces]]
binding = "WC_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Cheap + fast default for match previews/recaps. Override per-environment.
CLAUDE_MODEL = "claude-haiku-4-5"
