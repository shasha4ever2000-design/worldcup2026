<style>
:root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--ink2:#334155;--muted:#64748b;--green:#047857;--green-d:#064e3b;--green-l:#d1fae5;--gold:#f59e0b;--line:#e2e8f0;--rose:#e11d48;--chip:#f1f5f9;--shadow:0 1px 3px rgba(15,23,42,.06);--r:13px;--blue:#2563eb}

.tag.now{box-shadow:0 0 12px rgba(225,29,72,.55)}
.live-dot{box-shadow:0 0 8px rgba(255,255,255,.85)}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;padding-bottom:env(safe-area-inset-bottom)}
[dir="rtl"] body{font-family:"Segoe UI",Tahoma,Arial,sans-serif}
.wrap{max-width:720px;margin:0 auto;min-height:100vh}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}
header{position:relative;overflow:hidden;background:linear-gradient(135deg,#0f172a,var(--green-d) 60%,#0f172a);color:#fff;padding:calc(18px + env(safe-area-inset-top)) 16px 16px}
header>*{position:relative;z-index:1}

@keyframes heroGlow{from{transform:translateY(-4%) scale(1)}to{transform:translateY(4%) scale(1.09)}}
.motd{cursor:pointer;margin:0 0 12px;padding:14px 16px;border-radius:14px;background:linear-gradient(135deg,rgba(245,158,11,.16),rgba(22,163,74,.12));border:1px solid var(--gold);box-shadow:var(--shadow)}
.motd-lbl{font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.motd-row{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.motd-vs{color:var(--muted);font-weight:600;font-size:13px}
.motd-meta{font-size:12px;color:var(--muted);margin-top:6px}.motd-cd{font-size:13px;font-weight:700;color:var(--green);margin-top:4px;font-variant-numeric:tabular-nums}
.htop{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.htop h1{font-size:17px;font-weight:800}
.hbtn{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;background:rgba(255,255,255,.12);color:#fff}
.hbtn:hover{background:rgba(255,255,255,.22)}.hbtn.rose{background:var(--rose)}.hbtn.gold{background:var(--gold);color:#022c22}.hbtn.yt{background:#FF0000}.hbtn.yt:hover{background:#cc0000}
.live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}@keyframes rspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.sub{font-size:12px;color:#a7f3d0;margin-top:4px}
.hlinks{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.hlinks a,.hlinks button{font-size:12px;font-weight:700;text-decoration:none;color:#022c22;background:var(--gold);padding:7px 14px;border-radius:8px}
.hlinks .ghost{background:rgba(255,255,255,.12);color:#fff}
.hright{margin-inline-start:auto;display:flex;gap:6px;align-items:center}
.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:7px;margin-top:14px}
.lu{text-align:center;font-size:.72rem;color:var(--muted);margin-top:4px;min-height:1em;opacity:.8;display:flex;align-items:center;justify-content:center;gap:6px}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}.conn-dot.offline{background:var(--rose);animation:pulse 1.4s infinite}
.refresh-btn{border:none;background:none;color:var(--green);font-size:1rem;cursor:pointer;padding:2px 6px;border-radius:50%;transition:transform .3s,background .2s}.refresh-btn:hover{background:rgba(22,163,74,.1)}.refresh-btn.spin{animation:rspin .6s ease}
.dcard{background:rgba(255,255,255,.08);border-radius:10px;padding:8px;text-align:center}
.dcard b{font-size:16px;display:block;font-variant-numeric:tabular-nums}.dcard span{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#a7f3d0}
.nation{margin:14px 14px 12px;border-radius:16px;color:#fff;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.nation h2{font-size:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}.nation .grp{font-size:11px;opacity:.85;margin:2px 0 10px}
.nxt{background:rgba(255,255,255,.1);border-radius:12px;padding:12px;margin-bottom:10px}
.nxt .meta{display:flex;justify-content:space-between;font-size:11px;color:rgba(255,255,255,.8);flex-wrap:wrap;gap:4px}
.nxt .row{display:flex;align-items:center;gap:8px;font-weight:700;margin:6px 0;flex-wrap:wrap}
.cd{display:flex;gap:12px;margin-top:6px}.cd div{text-align:center}.cd b{font-size:18px;font-variant-numeric:tabular-nums;display:block}.cd span{font-size:9px;text-transform:uppercase;color:rgba(255,255,255,.8)}
.kr{display:flex;justify-content:space-between;align-items:center;font-size:12px;background:rgba(255,255,255,.06);border-radius:8px;padding:7px 10px;margin-top:6px;gap:6px}.kr .when{font-size:10px;color:rgba(255,255,255,.78);text-align:end}
.players{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:4px}.players::-webkit-scrollbar{display:none}
.plr{background:rgba(255,255,255,.1);border-radius:10px;padding:8px 12px;text-align:center;min-width:96px;flex-shrink:0}.plr .pn{font-size:11px;font-weight:700}.plr .pp{font-size:10px;color:#a7f3d0}
.tabs{position:sticky;top:0;z-index:30;background:var(--bg);display:flex;border-bottom:1px solid var(--line);transition:background .3s;overflow-x:auto}.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:80px;padding:11px 6px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s;white-space:nowrap}
.tab.on{color:var(--green);border-bottom:2px solid var(--green)}.tab:hover{color:var(--ink)}
.ctrls{padding:10px 14px 6px;background:var(--bg);border-bottom:1px solid var(--line)}
.ctop{display:flex;gap:7px;margin-bottom:7px}
.search{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;background:var(--card);color:var(--ink);transition:all .3s}
.search:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(4,120,87,.15)}
.tz{border:1px solid var(--line);border-radius:10px;padding:0 6px;font-size:12px;background:var(--card);color:var(--ink)}
.datestrip{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}.datestrip::-webkit-scrollbar{display:none}
.dbtn{flex-shrink:0;min-width:52px;text-align:center;border:1px solid var(--line);background:var(--card);border-radius:10px;padding:6px 8px;transition:all .2s}
.dbtn .dd{font-size:10px;color:var(--muted);text-transform:uppercase}.dbtn .dn{font-size:15px;font-weight:800}
.dbtn.on{background:var(--green);color:#fff;border-color:var(--green)}.dbtn.on .dd{color:#a7f3d0}
.dbtn.has::after{content:"";display:block;width:4px;height:4px;border-radius:50%;background:var(--gold);margin:2px auto 0}
.chips{display:flex;gap:6px;overflow-x:auto;padding:6px 0 3px;-webkit-overflow-scrolling:touch}.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;transition:all .2s}
.chip.on{background:var(--green);color:#fff;border-color:var(--green)}.chip:hover{border-color:var(--green)}
.sec{padding:8px 14px 40px}
.day-h{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:16px 0 7px;display:flex;align-items:center;gap:7px}
.day-h .pill{font-weight:700;color:var(--green);background:var(--green-l);font-size:10px;padding:2px 7px;border-radius:999px;text-transform:none}
.mc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:border-color .2s,transform .2s;position:relative}
.mc:hover{border-color:var(--green);transform:translateY(-1px)}
.mc.hi{border-color:#6ee7b7}
.mc.todayrow{box-shadow:0 0 0 2px var(--green-l),var(--shadow)}
.mc .mtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:4px}
.mc .time{font-size:13px;font-weight:700}.mc .et{font-size:10px;color:var(--muted)}
.mc .venue{font-size:10px;color:var(--muted);text-align:end}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:7px}
.tm{display:flex;align-items:center;gap:6px;min-width:0}.tm.aw{justify-content:flex-end}
.tm .fl{font-size:20px;line-height:1;flex-shrink:0;display:inline-flex;align-items:center;min-width:24px}
.flag{height:1.05em;width:auto;border-radius:2px;vertical-align:-.15em;display:inline-block;box-shadow:0 0 0 .5px rgba(0,0,0,.12)}.tm .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}.tm .nm.ph{color:var(--muted);font-size:12px}
.sc{font-weight:800;font-size:15px;font-variant-numeric:tabular-nums;background:var(--chip);color:var(--ink);padding:2px 9px;border-radius:7px}.sc.live-sc{background:var(--rose);color:#fff;position:relative}.min-lbl{display:block;font-size:9px;font-weight:600;text-align:center;opacity:.85;animation:pulse 1.4s infinite}
[data-theme="dark"] .sc{background:#fff;color:#0f172a}
.vs-t{font-size:11px;font-weight:700;color:#94a3b8}
.tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px}.tag.ft{background:var(--chip);color:var(--muted)}.tag.now{background:var(--rose);color:#fff;animation:pulse 1.4s infinite}.tag.stg{background:#eef2ff;color:#4338ca}
[data-theme="dark"] .tag.stg{background:#312e81;color:#a5b4fc}
.fav-star{position:absolute;top:8px;inset-inline-end:8px;font-size:16px;opacity:.35;transition:opacity .2s;line-height:1}.fav-star.on{opacity:1}
.poll{margin-top:8px;display:flex;gap:6px}
.poll button{flex:1;font-size:11px;font-weight:600;padding:6px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink);transition:all .2s;position:relative;overflow:hidden}
.poll button.voted{background:var(--green);color:#fff;border-color:var(--green)}
.pbar{position:absolute;inset-inline-start:0;bottom:0;height:3px;background:var(--gold);opacity:.7}
.grp-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.grp-hdr{padding:10px 13px;font-weight:800;font-size:13px;background:var(--chip);border-bottom:1px solid var(--line)}
.scen{padding:9px 11px;border-top:1px dashed var(--line);background:var(--chip)}
.scen-h{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
.scen-chip{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;padding:4px 2px}
.scen-chip b{font-weight:700}
.scen-chip span{font-weight:700;white-space:nowrap}
.scen-chip.q span{color:var(--green)}
.scen-chip.out span{color:#94a3b8}
.scen-chip.out b{opacity:.6}
.scen-chip.live span{color:#f59e0b}
.ai-card{background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(16,185,129,.08));border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-top:12px}
.ai-h{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.ai-body{font-size:13px;line-height:1.55;white-space:pre-wrap}
.ai-loading{color:var(--muted);font-style:italic}
.grp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.grp-tbl th{text-align:start;padding:6px 8px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--line)}
.grp-tbl td{padding:7px 8px;border-bottom:1px solid var(--line)}.grp-tbl tr:last-child td{border-bottom:none}
.grp-tbl .pos{font-weight:800;color:var(--muted);width:22px;text-align:center}
.grp-tbl tr.qual{box-shadow:inset 3px 0 0 var(--green)}
.grp-tbl .tn{font-weight:700;cursor:pointer}
.grp-tbl .pts{font-weight:800;color:var(--green)}
.form{display:inline-flex;gap:2px;margin-inline-start:4px}
.fdot{width:13px;height:13px;border-radius:3px;font-size:8px;font-weight:800;color:#fff;display:inline-flex;align-items:center;justify-content:center}
.fdot.W{background:var(--green)}.fdot.D{background:#94a3b8}.fdot.L{background:var(--rose)}
.bracket{padding:14px;overflow-x:auto}.bracket h3{font-size:14px;font-weight:800;margin-bottom:12px}
.brk-round{margin-bottom:20px}.brk-round h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px;letter-spacing:.04em}
.brk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.brk-m{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;box-shadow:var(--shadow);cursor:pointer}

function teamForm(team){const ms=M.filter(m=>(m.h===team||m.a===team)&&m.s).sort((a,b)=>new Date(a.dt)-new Date(b.dt));return ms.slice(-5).map(m=>{const[h,a]=m.s.split("-").map(Number);const gf=m.h===team?h:a,ga=m.h===team?a:h;return gf>ga?"W":gf<ga?"L":"D"})}
function predict(h,a){const rk=x=>(TEAM_INFO[x]&&TEAM_INFO[x].rank)?TEAM_INFO[x].rank:50;const fp=x=>teamForm(x).reduce((s,r)=>s+(r==="W"?5:r==="D"?2:0),0);const Rh=100-rk(h)+fp(h),Ra=100-rk(a)+fp(a),diff=Rh-Ra;let pH=1/(1+Math.pow(10,-diff/18)),pA=1-pH;const dw=0.28*Math.exp(-Math.pow(diff/45,2));let x=pH*(1-dw),z=pA*(1-dw),y=dw,tot=x+y+z;let H=Math.round(x/tot*100),D=Math.round(y/tot*100),A=100-H-D;if(A<0){D+=A;A=0}return[H,D,A]}

function calcStandings(grp){const ts=GROUPS[grp].map(t=>({t,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}));M.filter(m=>m.g===grp&&m.s).forEach(m=>{const[gh,ga]=m.s.split("-").map(Number),H=ts.find(x=>x.t===m.h),A=ts.find(x=>x.t===m.a);if(!H||!A)return;H.mp++;A.mp++;H.gf+=gh;H.ga+=ga;A.gf+=ga;A.ga+=gh;if(gh>ga){H.w++;H.pts+=3;A.l++}else if(gh<ga){A.w++;A.pts+=3;H.l++}else{H.d++;A.d++;H.pts++;A.pts++}});return ts.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf)}
/* Resolve knockout placeholders (1A/2B/3·ABCDF/W73/L101) into real teams as
   results land. Mirrors bracketResolve() in src/logic.mjs. */
function bracketResolve(){
  const ko=M.filter(m=>m.ph);let n=73;const byNum=new Map();
  ko.forEach(m=>{m.__num=n;byNum.set(n,m);n++});
  const gks=Object.keys(GROUPS),standings={},complete={};
  gks.forEach(g=>{standings[g]=calcStandings(g);const tt=GROUPS[g].length;complete[g]=M.filter(m=>m.g===g&&m.s).length>=tt*(tt-1)/2});
  const thirdSlot={};let thirdsProvisional=false;
  if(gks.every(g=>complete[g])){
    const thirds=gks.map(g=>Object.assign({g},standings[g][2])).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||a.g.localeCompare(b.g));
    const q=thirds.slice(0,8),qSet=new Set(q.map(x=>x.g)),byGroup={};q.forEach(x=>byGroup[x.g]=x.t);
    const slots=[...new Set(ko.map(m=>[m.h,m.a]).flat().filter(c=>typeof c==="string"&&c.indexOf("3·")===0))];
    const used=new Set();const assign=i=>{if(i>=slots.length)return true;const code=slots[i],el=code.slice(code.indexOf("·")+1).split("");for(const g of el){if(qSet.has(g)&&!used.has(g)){used.add(g);thirdSlot[code]=byGroup[g];if(assign(i+1))return true;used.delete(g);thirdSlot[code]=undefined}}return false};
    if(slots.length){assign(0);thirdsProvisional=true}
  }
  const cache=new Map();
  const rc=code=>{if(typeof code!=="string")return code||null;if(cache.has(code))return cache.get(code);cache.set(code,null);let team=null;if(/^[12][A-L]$/.test(code)){const g=code[1];if(complete[g])team=standings[g][code[0]==="1"?0:1].t}else if(code.indexOf("3·")===0){team=thirdSlot[code]||null}else if(/^[WL]\d+$/.test(code)){const mm=byNum.get(+code.slice(1));team=code[0]==="W"?winnerOf(mm):loserOf(mm)}cache.set(code,team);return team};
  const side=(m,s)=>m.ph?rc(m[s]):m[s];
  function decided(m){if(!m||!m.s)return null;const h=side(m,"h"),a=side(m,"a");if(!h||!a)return null;const[gh,ga]=m.s.split("-").map(Number);if(gh===ga)return null;return{win:gh>ga?h:a,lose:gh>ga?a:h}}
  function winnerOf(m){const d=decided(m);return d?d.win:null}
  function loserOf(m){const d=decided(m);return d?d.lose:null}
  const out=new Map();ko.forEach(m=>out.set(m,{h:side(m,"h"),a:side(m,"a"),num:m.__num}));out.thirdsProvisional=thirdsProvisional;return out;
}
/* Group qualification scenarios (q / out / live + next-match hint). Brute-forces
   remaining results as generic W/D/L. Mirrors qualScenarios in src/logic.mjs. */
function qualScenarios(grp){
  const teams=GROUPS[grp];
  const played=M.filter(m=>m.g===grp&&m.s&&!m.ph&&m.h&&m.a);
  const remaining=M.filter(m=>m.g===grp&&!m.s&&!m.ph&&m.h&&m.a);
  if(!remaining.length||!played.length)return null;
  const apply=(tb,h,a,gh,ga)=>{tb[h].gf+=gh;tb[h].ga+=ga;tb[a].gf+=ga;tb[a].ga+=gh;if(gh>ga)tb[h].pts+=3;else if(ga>gh)tb[a].pts+=3;else{tb[h].pts++;tb[a].pts++}};
  const base=()=>{const tb={};teams.forEach(x=>tb[x]={t:x,pts:0,gf:0,ga:0});played.forEach(m=>{const[gh,ga]=m.s.split("-").map(Number);apply(tb,m.h,m.a,gh,ga)});return tb};
  const top2=tb=>{const arr=Object.values(tb).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);return new Set([arr[0].t,arr[1].t])};
  const n=remaining.length,total=3**n,sets=[],outcomes=[];
  for(let mask=0;mask<total;mask++){const tb=base(),os=[];let mm=mask;for(let j=0;j<n;j++){const o=mm%3;mm=Math.floor(mm/3);os.push(o);const g=remaining[j];apply(tb,g.h,g.a,o===0?1:0,o===2?1:0)}sets.push(top2(tb));outcomes.push(os)}
  const status={},hint={};
  teams.forEach(x=>{let inAll=true,inAny=false;for(const s of sets){if(s.has(x))inAny=true;else inAll=false}status[x]=inAll?"q":!inAny?"out":"live";hint[x]=null;
    if(status[x]==="live"){const j=remaining.findIndex(m=>m.h===x||m.a===x);if(j>=0){const winO=remaining[j].h===x?0:2;const guar=o=>{let any=false;for(let k=0;k<total;k++){if(outcomes[k][j]!==o)continue;any=true;if(!sets[k].has(x))return false}return any};hint[x]=guar(winO)?"win":guar(1)?"draw":null}}});
  return{status,hint,remaining:n};
}

/* ============ SIMULATOR ============ */
function calcStandingsSim(grp){
  const ts=GROUPS[grp].map(t=>({t,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}));
  M.filter(m=>m.g===grp&&!m.ph).forEach(m=>{
    const score=(m.s!=null)?m.s:(simScores[mId(m)]!=null?simScores[mId(m)]:null);
    if(score==null)return;
    const[gh,ga]=score.split("-").map(Number);
    const H=ts.find(x=>x.t===m.h),A=ts.find(x=>x.t===m.a);
    if(!H||!A)return;
    H.mp++;A.mp++;H.gf+=gh;H.ga+=ga;A.gf+=ga;A.ga+=gh;
    if(gh>ga){H.w++;H.pts+=3;A.l++}else if(gh<ga){A.w++;A.pts+=3;H.l++}else{H.d++;A.d++;H.pts++;A.pts++}
  });
  return ts.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}

  });
  return h+"</tbody></table>";
}

function tournamentStats(M){const played=M.filter(m=>m.s);let goals=0,clean=0,homeWins=0,draws=0,awayWins=0,high=null,big=null;for(const m of played){const[h,a]=m.s.split("-").map(Number);goals+=h+a;if(h===0||a===0)clean++;if(h>a)homeWins++;else if(h<a)awayWins++;else draws++;if(!high||h+a>high.tot)high={m,tot:h+a};if(!big||Math.abs(h-a)>big.diff)big={m,diff:Math.abs(h-a)}}return{count:played.length,goals,avg:played.length?Math.round(goals/played.length*100)/100:0,clean,homeWins,draws,awayWins,high,big}}
function teamTournament(team,M){let played=0,w=0,d=0,l=0,gf=0,ga=0;for(const m of M){if(m.ph||!m.s)continue;if(m.h!==team&&m.a!==team)continue;const[h,a]=m.s.split("-").map(Number);const isH=m.h===team;const f=isH?h:a,against=isH?a:h;played++;gf+=f;ga+=against;if(f>against)w++;else if(f<against)l++;else d++}return{played,w,d,l,gf,ga,gd:gf-ga}}

const ALL_TEAMS=()=>Object.values(GROUPS).flat();
window.openCompare=function(teamA,teamB){
  const teams=ALL_TEAMS().slice().sort((a,b)=>tn(a).localeCompare(tn(b),lang==="ar"?"ar":"en"));
  if(!teamA||!teams.includes(teamA))teamA=teams[0];
  if(!teamB||teamB===teamA||!teams.includes(teamB))teamB=teams.find(x=>x!==teamA);
  const opts=sel=>teams.map(x=>`<option value="${escapeHtml(x)}"${x===sel?" selected":""}>${tn(x)}</option>`).join("");
  document.getElementById("sheetTitle").innerHTML="⚔️ "+L("Compare Teams","مقارنة المنتخبات","Comparar equipos","Comparar seleções","Comparer les équipes","Teams vergleichen","Confronta squadre","チーム比較");
  const b=`<div class="cmp-pickers"><select class="tz cmp-sel" id="cmpA" onchange="cmpUpdate()">${opts(teamA)}</select><span style="font-weight:800;color:var(--muted)">⚔️</span><select class="tz cmp-sel" id="cmpB" onchange="cmpUpdate()">${opts(teamB)}</select></div><div id="cmpBody"></div>`;

window.cmpUpdate=function(){const a=document.getElementById("cmpA"),b=document.getElementById("cmpB");if(a&&b)renderCompare(a.value,b.value)};
function renderCompare(a,b){
  const body=document.getElementById("cmpBody");if(!body)return;
  if(a===b){body.innerHTML=`<div class="empty">${L("Pick two different teams","اختر منتخبين مختلفين","Elige dos equipos diferentes","Escolha duas seleções diferentes","Choisissez deux équipes différentes","Wähle zwei verschiedene Teams","Scegli due squadre diverse","異なる2チームを選択")}</div>`;return}
  const sa=teamTournament(a,M),sb=teamTournament(b,M);
  const rk=x=>(TEAM_INFO[x]&&TEAM_INFO[x].rank)?TEAM_INFO[x].rank:null;
  const ra=rk(a),rb=rk(b),fa=teamForm(a),fb=teamForm(b);
  const dots=f=>f.length?`<span class="form">${f.map(x=>`<span class="fdot ${x}">${x}</span>`).join("")}</span>`:"—";
  // better: 'a' | 'b' | '' — which column is stronger (lit green)
  const row=(lbl,va,vb,better)=>`<div class="cmp-row"><span class="cmp-a${better==="a"?" win":""}">${va}</span><span class="cl">${lbl}</span><span class="cmp-b${better==="b"?" win":""}">${vb}</span></div>`;
  const cmpNum=(x,y,hi)=>x===y?"":hi?(x>y?"a":"b"):(x<y?"a":"b"); // hi=true → higher wins
  let h=`<div class="cmp-head"><div><div class="cf">${fl(a)}</div><div class="cn">${tn(a)}</div></div><div class="cvs">${t().vs}</div><div><div class="cf">${fl(b)}</div><div class="cn">${tn(b)}</div></div></div>`;
  h+=row(t().rank,ra?"#"+ra:"—",rb?"#"+rb:"—",(ra&&rb)?cmpNum(ra,rb,false):"");
  h+=row(t().played,sa.played,sb.played,"");
  h+=row("✅ "+t().w+" / "+t().d+" / "+t().l,`${sa.w}-${sa.d}-${sa.l}`,`${sb.w}-${sb.d}-${sb.l}`,cmpNum(sa.w,sb.w,true));
  h+=row("⚽ "+t().goals,sa.gf,sb.gf,cmpNum(sa.gf,sb.gf,true));
  h+=row(t().gd,(sa.gd>0?"+":"")+sa.gd,(sb.gd>0?"+":"")+sb.gd,cmpNum(sa.gd,sb.gd,true));
  h+=row(t().form,dots(fa),dots(fb),"");
  const[pH,pD,pA]=predict(a,b);
  h+=`<div class="fb-label" style="margin-top:14px">${t().winProb}</div><div class="prob"><div class="prob-row"><span class="pl">${fl(a)} ${tn(a)}</span><span class="prob-track"><span class="prob-fill" style="width:${pH}%;background:var(--green)"></span></span><span class="pv">${pH}%</span></div><div class="prob-row"><span class="pl">${t().draw}</span><span class="prob-track"><span class="prob-fill" style="width:${pD}%;background:#94a3b8"></span></span><span class="pv">${pD}%</span></div><div class="prob-row"><span class="pl">${fl(b)} ${tn(b)}</span><span class="prob-track"><span class="prob-fill" style="width:${pA}%;background:var(--blue)"></span></span><span class="pv">${pA}%</span></div></div><div class="fb-note" style="text-align:start">${t().predNote}</div>`;
  body.innerHTML=h;
}

function goalSound(){try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="triangle";o.frequency.setValueAtTime(880,ctx.currentTime);o.frequency.setValueAtTime(1100,ctx.currentTime+.08);o.frequency.setValueAtTime(880,ctx.currentTime+.16);g.gain.setValueAtTime(.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);o.start();o.stop(ctx.currentTime+.3)}catch{}}
function celebrateGoal(){goalSound();
  if(!matchMedia("(prefers-reduced-motion: no-preference)").matches)return;
  if(document.hidden)return;
  let c=document.getElementById("confettiCanvas");
  if(!c){c=document.createElement("canvas");c.id="confettiCanvas";document.body.appendChild(c)}
  const ctx=c.getContext("2d"),DPR=Math.min(devicePixelRatio||1,2);
  c.width=innerWidth*DPR;c.height=innerHeight*DPR;ctx.scale(DPR,DPR);
  const cols=["#16a34a","#facc15","#2563eb","#f43f5e","#ffffff"];
  const N=Math.min(90,Math.round(innerWidth/6));
  const P=Array.from({length:N},()=>({x:innerWidth/2+(Math.random()-.5)*120,y:innerHeight*.32,vx:(Math.random()-.5)*9,vy:Math.random()*-9-4,r:4+Math.random()*4,col:cols[Math.random()*cols.length|0],rot:Math.random()*6.28,vr:(Math.random()-.5)*.4,a:1}));
  const t0=performance.now();
  (function frame(t){const dt=Math.min(33,t-(frame._l||t));frame._l=t;ctx.clearRect(0,0,innerWidth,innerHeight);let alive=false;
    for(const p of P){p.vy+=.22;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.a=Math.max(0,1-(t-t0)/1500);if(p.a>0&&p.y<innerHeight+20){alive=true;ctx.save();ctx.globalAlpha=p.a;ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);ctx.restore()}}
    if(alive)requestAnimationFrame(frame);else{ctx.clearRect(0,0,innerWidth,innerHeight);c.remove()}
  })(t0);
  vibrate(20);
}

function compactVotes(v){return M.map(m=>VC[v[mId(m)]]||"-").join("")}
function expandVotes(s){const out={};if(typeof s!=="string")return out;for(let i=0;i<Math.min(s.length,M.length);i++){const v=VCR[s[i]];if(v)out[mId(M[i])]=v}return out}
function encodePicks(){

}
function decodePicks(s){
  try{if(typeof s!=="string"||!s)return null;const pad=s+"=".repeat((4-(s.length%4))%4);const j=JSON.parse(decodeURIComponent(escape(atob(pad))));if(j&&j.v===1)return j}catch{}return null;
}
function actualWinner(m){if(!m.s)return null;const[h,a]=m.s.split("-").map(Number);return h>a?"h":h<a?"a":"d"}
function scoreVotes(v){let pts=0,total=0,decided=0;M.forEach(m=>{const pick=v[mId(m)];if(!pick)return;total++;const w=actualWinner(m);if(w==null)return;decided++;if(w===pick)pts++});return{pts,total,decided}}

function handleIncomingPicks(){
  try{
    const u=new URL(location.href),pk=u.searchParams.get("picks");
    if(!pk)return;
    const data=decodePicks(pk);
    if(!data)return;
    // Clean URL so refresh doesn't re-prompt
    u.searchParams.delete("picks");history.replaceState(null,"",u);
    if(!data.n){toast(L("Invalid pick'em link","رابط توقعات غير صالح","Enlace de pronósticos no válido","Link de palpites inválido","Lien de pronostics invalide","Ungültiger Tipp-Link","Link pronostici non valido","無効な予想リンク"));return}
    const friendName=data.n.slice(0,20);
    const myName=(store.get("wc_name","")||"").trim();
    if(myName&&friendName.toLowerCase()===myName.toLowerCase())return; // ignore self-share
    setTimeout(()=>{
      const msg=t().addFriend.replace("{name}",friendName);
      if(confirm(msg)){
        const existing=friends.findIndex(f=>f.name.toLowerCase()===friendName.toLowerCase());
        if(existing>=0){friends[existing]={name:friendName,p:data.p||"",f:data.f||[],t:Date.now()};toast(t().friendDupe.replace("{name}",friendName))}
        else{friends.push({name:friendName,p:data.p||"",f:data.f||[],t:Date.now()});toast(t().friendAdded.replace("{name}",friendName))}
        store.set("wc_friends",friends);
        if(window.trackEvent)trackEvent("league_friend_added");
        tab="league";render();
      }
    },400);
  }catch{}
}

    ? "https://news.google.com/rss/search?q=%D9%83%D8%A3%D8%B3+%D8%A7%D9%84%D8%B9%D8%A7%D9%84%D9%85+2026&hl=ar&gl=SA&ceid=SA:ar"
    : lang==="es"
    ? "https://news.google.com/rss/search?q=Mundial+2026&hl=es-419&gl=MX&ceid=MX:es-419"
    : lang==="pt"
    ? "https://news.google.com/rss/search?q=Copa+do+Mundo+2026&hl=pt-BR&gl=BR&ceid=BR:pt-419"
    : lang==="fr"
    ? "https://news.google.com/rss/search?q=Coupe+du+Monde+2026&hl=fr&gl=FR&ceid=FR:fr"
    : lang==="de"
    ? "https://news.google.com/rss/search?q=Fu%C3%9Fball-WM+2026&hl=de&gl=DE&ceid=DE:de"
    : lang==="it"
    ? "https://news.google.com/rss/search?q=Mondiali+2026&hl=it&gl=IT&ceid=IT:it"
    : lang==="ja"
    ? "https://news.google.com/rss/search?q=%E3%83%AF%E3%83%BC%E3%83%AB%E3%83%89%E3%82%AB%E3%83%83%E3%83%97+2026&hl=ja&gl=JP&ceid=JP:ja"
    : "https://feeds.bbci.co.uk/sport/football/world-cup/rss.xml";
  try{
    const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}&count=12`,{cache:"default"});
    if(!r.ok)throw new Error();
    const j=await r.json();
    if(j.status!=="ok"||!j.items||!j.items.length)throw new Error();
    // Google News titles end with " - Source" — strip it for cleaner display
    const items=j.items.slice(0,10).map(it=>"📰 "+it.title.replace(/\s+-\s+[^-]+$/,""));
    setTickerItems(items);
    return;
  }catch(e){}
  setTickerItems(fallback);
}

function setTickerItems(items){
  const el=document.getElementById("tickerInner");if(!el)return;
  const safe=spoilerFree?items.map(s=>s.replace(/\b\d{1,2}\s*[-–]\s*\d{1,2}\b/g,"•–•")):items;
  const sep='<span class="tick-sep">◆</span>';
  const html=safe.map(i=>`<span class="tick-item">${i}</span>`).join(sep);
  el.innerHTML=html+sep+html; // duplicate = seamless infinite loop
  // Dynamic speed: ~80px/s feels natural
  const totalChars=safe.join("").length;
  el.style.animationDuration=Math.max(30,Math.round(totalChars*0.28))+"s";
}
if("serviceWorker"in navigator){
  let refreshing=false;
  const hadController=!!navigator.serviceWorker.controller;
  // When a NEW version takes control of an already-loaded page, reload once so the
  // freshest page/assets show. Skipped on first-ever visit (no prior controller).
  navigator.serviceWorker.addEventListener("controllerchange",()=>{if(refreshing||!hadController)return;refreshing=true;location.reload()});
  navigator.serviceWorker.register("sw.js").then(reg=>{
    // Check for a new version on load, on focus, and every 30 min.
    reg.update().catch(()=>{});
    const trigger=()=>{const w=reg.installing||reg.waiting;if(w)w.postMessage&&w.postMessage({type:"skip-waiting"})};
    reg.addEventListener("updatefound",()=>{const nw=reg.installing;if(!nw)return;nw.addEventListener("statechange",()=>{if(nw.state==="installed"&&navigator.serviceWorker.controller){nw.postMessage({type:"skip-waiting"})}})});
    document.addEventListener("visibilitychange",()=>{if(!document.hidden)reg.update().catch(()=>{})});
    setInterval(()=>reg.update().catch(()=>{}),18e5);
  }).catch(()=>{});
}
/* ============ VISITOR ANALYTICS ============ */
// Local-only visit tracking + GA4 events (real counter lives in GA dashboard).
(function trackVisit(){
  const visits=store.get('wc_visits',0)+1;
  store.set('wc_visits',visits);
  const firstVisit=store.get('wc_first_visit',null);
  if(!firstVisit)store.set('wc_first_visit',new Date().toISOString());
  store.set('wc_last_visit',new Date().toISOString());
  store.set('wc_lang_pref',navigator.language);
  if(window.trackEvent)trackEvent('visit',{visit_count:visits,language:lang,theme:theme,is_returning:visits>1});
})();
