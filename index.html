  .htop h1{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .live{display:inline-flex;align-items:center;gap:5px;background:var(--rose);font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .live .dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .lang-btn{margin-inline-start:auto;background:rgba(255,255,255,.15);color:#fff;border:none;font-size:13px;font-weight:700;padding:6px 14px;border-radius:10px;cursor:pointer}
  .lang-btn:hover{background:rgba(255,255,255,.25)}
  .sub{font-size:12px;color:#a7f3d0;margin-top:4px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
  .stat{background:rgba(255,255,255,.08);border-radius:10px;padding:9px;text-align:center}
  .stat b{font-size:17px;display:block}.stat span{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#a7f3d0}
  .links{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
  .links a{flex:1;min-width:120px;text-align:center;font-size:12.5px;font-weight:700;text-decoration:none;color:#022c22;background:var(--gold);padding:9px;border-radius:9px}
  .links a.ghost{background:rgba(255,255,255,.12);color:#fff}
  .ksa{margin:16px 14px 0;border-radius:16px;color:#fff;padding:16px;background:linear-gradient(135deg,var(--green) 0%,var(--green-d) 100%);box-shadow:0 8px 24px rgba(4,120,87,.25)}
  .ksa h2{font-size:15px;display:flex;align-items:center;gap:8px}
  .ksa .grp{font-size:11px;color:#a7f3d0;margin:2px 0 12px}
  .next{background:rgba(255,255,255,.1);border-radius:12px;padding:13px;margin-bottom:12px}
  .next .row{display:flex;align-items:center;gap:8px;font-weight:700;margin:6px 0;flex-wrap:wrap}
  .next .meta{display:flex;justify-content:space-between;font-size:11px;color:#a7f3d0;flex-wrap:wrap;gap:4px}
  .cd{display:flex;gap:14px;margin-top:8px}.cd div{text-align:center}
  .cd b{font-size:20px;font-variant-numeric:tabular-nums;display:block}.cd span{font-size:9px;text-transform:uppercase;color:#a7f3d0}
  .ksa-list .kr{display:flex;justify-content:space-between;align-items:center;font-size:13px;background:rgba(255,255,255,.06);border-radius:9px;padding:8px 11px;margin-top:7px;gap:8px}
  .ksa-list .kr .when{font-size:11px;color:#a7f3d0;text-align:end;white-space:nowrap}
  .controls{position:sticky;top:0;z-index:20;background:#f1f5f9;padding:14px 14px 8px;border-bottom:1px solid var(--line)}
  .ctop{display:flex;gap:8px;margin-bottom:8px}
  .search{flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;background:#fff;color:var(--ink)}
  .tz{border:1px solid var(--line);border-radius:10px;padding:0 8px;font-size:13px;background:#fff;color:var(--ink)}
  .chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}.chips::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer}
  .chip.on{background:var(--green);color:#fff;border-color:var(--green)}
  .list{padding:8px 14px 40px}
  .day{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:18px 4px 8px;display:flex;align-items:center;gap:8px}
  .day .pill{font-weight:700;color:var(--green);background:#d1fae5;font-size:10px;padding:2px 7px;border-radius:999px;text-transform:none;letter-spacing:0}
  .m{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px;box-shadow:0 1px 2px rgba(15,23,42,.04)}
  .m.ksa-m{border-color:#6ee7b7;background:#ecfdf5}
  .m .mtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:6px}
  .m .time{font-size:13px;font-weight:700;color:var(--ink)}
  .m .et{font-size:11px;color:var(--muted)}
  .m .venue{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:3px;text-align:end}
  .teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .tm{display:flex;align-items:center;gap:7px;min-width:0}.tm.away{justify-content:flex-end}
  .tm .fl{font-size:20px;line-height:1}.tm .nm{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tm .nm.ph{font-weight:600;color:var(--muted);font-size:12.5px}
  .sc{font-weight:800;font-size:16px;font-variant-numeric:tabular-nums;background:var(--chip);padding:3px 10px;border-radius:8px;white-space:nowrap}
  .vs{font-size:11px;font-weight:700;color:#94a3b8}
  .tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}

  .legend{font-size:11px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;margin:10px 0}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:6px 14px 30px}

/* ========== State ========== */
let lang="en",tz="Asia/Riyadh",filter="all",query="";
const t=()=>T[lang], tn=n=>lang==="ar"?(TEAM_AR[n]||n):n, tc=c=>lang==="ar"?(CITY_AR[c]||c):c;

/* 12-hour AM/PM */
const fmtTime=(d,zone)=>{const z=zone||(tz==="auto"?undefined:tz);return new Intl.DateTimeFormat(lang==="ar"?"ar-SA":"en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:z}).format(d)};
const fmtET=d=>new Intl.DateTimeFormat("en-US",{hour:"numeric",minute:"2-digit",hour12:true,timeZone:"America/New_York"}).format(d);
const fmtDay=d=>{const z=tz==="auto"?undefined:tz;return new Intl.DateTimeFormat(lang==="ar"?"ar-SA":"en-US",{weekday:"long",day:"numeric",month:"long",timeZone:z}).format(d)};
const dayKey=d=>{const z=tz==="auto"?undefined:tz;return new Intl.DateTimeFormat("en-US",{year:"numeric",month:"2-digit",day:"2-digit",timeZone:z}).format(d)};
function stageLabel(g){const map={R32:t().r32,R16:t().r16,QF:t().qf,SF:t().sf,"3rd":t().third,Final:t().final};return map[g]||(t().grpLbl+" "+g)}
function status(d){const n=Date.now(),x=d.getTime();if(n>=x&&n<x+115*6e4)return"now";if(n>=x+115*6e4)return"ft";return"up"}

/* ========== Render ========== */
function setDir(){document.documentElement.lang=lang==="ar"?"ar":"en";document.documentElement.dir=lang==="ar"?"rtl":"ltr"}
function renderStatic(){
  document.getElementById("t_title").textContent=t().title;
  document.getElementById("t_live").textContent=t().live;
  document.getElementById("t_sub").textContent=t().sub;
  document.getElementById("statsBar").innerHTML=[[48,t().teams],[104,t().matches],[16,t().cities]].map(([n,l])=>`<div class="stat"><b>${n}</b><span>${l}</span></div>`).join("");
  document.getElementById("t_scores").textContent=t().scores;
  document.getElementById("t_news").textContent=t().news;
  document.getElementById("t_ksa_title").innerHTML=t().ksa_title;
  document.getElementById("t_ksa_grp").textContent=t().ksa_grp;
  document.getElementById("search").placeholder=t().search;
  document.getElementById("tz_local").textContent=t().localTz;
  document.getElementById("langBtn").textContent=t().switchLang;
  document.getElementById("t_footer").innerHTML=t().footer;
}
function renderKSA(){
  const KSA=M.filter(m=>m.h==="Saudi Arabia"||m.a==="Saudi Arabia");
  const now=Date.now();
  const next=KSA.find(m=>new Date(m.dt).getTime()>now)||KSA[KSA.length-1];
  const d=new Date(next.dt),opp=next.h==="Saudi Arabia"?next.a:next.h,diff=d.getTime()-now;
  let cd;
  if(diff>0){const dd=Math.floor(diff/864e5),hh=Math.floor(diff%864e5/36e5),mm=Math.floor(diff%36e5/6e4),ss=Math.floor(diff%6e4/1e3);
    const box=(v,l)=>`<div><b>${String(v).padStart(2,"0")}</b><span>${l}</span></div>`;
    cd=`<div class="cd">${box(dd,t().days)}${box(hh,t().hrs)}${box(mm,t().min)}${box(ss,t().sec)}</div>`;
  }else{cd=`<div style="font-size:13px;color:#a7f3d0;font-weight:600;margin-top:6px">${t().started}</div>`}
  document.getElementById("ksaNext").innerHTML=`
    <div class="meta"><span>${t().next_match}</span><span>${fmtDay(d)} · ${fmtTime(d)}</span></div>
    <div class="row">🇸🇦 ${tn("Saudi Arabia")} <span class="vs" style="color:#a7f3d0">${t().vs}</span> ${tn(opp)} ${FLAGS[opp]||""}
      <span style="margin-inline-start:auto;font-size:11px;color:#a7f3d0">${tc(next.c)}</span></div>${cd}`;
  document.getElementById("ksaList").innerHTML=KSA.map(m=>{const dd=new Date(m.dt),opp=m.h==="Saudi Arabia"?m.a:m.h;
    return`<div class="kr"><span>${FLAGS[opp]||""} ${t().vs} ${tn(opp)}</span><span class="when">${fmtDay(dd)}<br>${fmtTime(dd)}</span></div>`}).join("");
}
const CHIP_KEYS=["all","today","ksa","ko","A","B","C","D","E","F","G","H","I","J","K","L"];
function chipLabel(k){const map={all:t().all,today:t().today,ksa:t().ksa,ko:t().ko};return map[k]||(t().grpLbl+" "+k)}
function renderChips(){
  document.getElementById("chips").innerHTML=CHIP_KEYS.map(k=>`<div class="chip ${filter===k?'on':''}" data-k="${k}">${chipLabel(k)}</div>`).join("");
  document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{filter=c.dataset.k;renderChips();renderList()});
}
const KO_S=["R32","R16","QF","SF","3rd","Final"];
function passes(m){
  if(query){const q=query.toLowerCase();if(!((m.h||"").toLowerCase().includes(q)||(m.a||"").toLowerCase().includes(q)||(TEAM_AR[m.h]||"").includes(q)||(TEAM_AR[m.a]||"").includes(q)))return false}
  if(filter==="all")return true;if(filter==="today")return dayKey(new Date(m.dt))===dayKey(new Date());
  if(filter==="ksa")return m.h==="Saudi Arabia"||m.a==="Saudi Arabia";
  if(filter==="ko")return KO_S.includes(m.g);return m.g===filter;
}
function teamHTML(name,ph,away){
  if(ph)return`<div class="tm ${away?'away':''}"><span class="nm ph">${name}</span></div>`;
  const fl=FLAGS[name]||"⚽";
  return`<div class="tm ${away?'away':''}">${away?'':`<span class="fl">${fl}</span>`}<span class="nm">${tn(name)}</span>${away?`<span class="fl">${fl}</span>`:''}</div>`;
}
function renderList(){
  const rows=M.filter(passes),el=document.getElementById("list");
  if(!rows.length){el.innerHTML=`<div class="empty">${t().noMatch}</div>`;return}
  let html="";if(filter==="ko")html+=`<div class="legend">${t().koLegend}</div>`;
  let lastDay="";const todayK=dayKey(new Date());
  rows.forEach(m=>{const d=new Date(m.dt),dk=dayKey(d);
    if(dk!==lastDay){lastDay=dk;html+=`<div class="day">${fmtDay(d)} ${dk===todayK?`<span class="pill">${t().todayPill}</span>`:''}</div>`}
    const st=status(d),isKsa=m.h==="Saudi Arabia"||m.a==="Saudi Arabia";
    let mid;if(m.s){mid=`<span class="sc">${m.s.split("-")[0]} – ${m.s.split("-")[1]}</span>`}
    else if(st==="now"){mid=`<span class="tag now">${t().liveLbl}</span>`}
    else if(st==="ft"){mid=`<span class="tag ft">${t().ft}</span>`}
    else{mid=`<span class="vs">${t().vs}</span>`}
    html+=`<div class="m ${isKsa?'ksa-m':''}"><div class="mtop"><div><div class="time">${fmtTime(d)}</div><div class="et">${fmtET(d)} ET · <span class="tag grp" style="font-size:9px">${stageLabel(m.g)}</span></div></div><div class="venue">📍 ${tc(m.c)}</div></div><div class="teams">${teamHTML(m.h,m.ph,false)}${mid}${teamHTML(m.a,m.ph,true)}</div></div>`;
  });el.innerHTML=html;
}
function fullRender(){setDir();renderStatic();renderKSA();renderChips();renderList()}

/* ========== Events ========== */
document.getElementById("tz").onchange=e=>{tz=e.target.value;fullRender()};
document.getElementById("search").oninput=e=>{query=e.target.value;renderList()};
document.getElementById("langBtn").onclick=()=>{lang=lang==="en"?"ar":"en";query="";document.getElementById("search").value="";fullRender()};
fullRender();setInterval(renderKSA,1000);setInterval(renderList,60000);
</script>
