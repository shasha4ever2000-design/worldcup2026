<title>FIFA World Cup 2026 — كأس العالم</title>
<meta name="description" content="Premium FIFA World Cup 2026 hub — live schedule, group standings, knockout bracket, team profiles. English & Arabic."/>
<meta name="theme-color" content="#064e3b"/>

<style>
:root{--bg:#f1f5f9;--card:#fff;--ink:#0f172a;--ink2:#334155;--muted:#64748b;--green:#047857;--green-d:#064e3b;--green-l:#d1fae5;--gold:#f59e0b;--line:#e2e8f0;--rose:#e11d48;--chip:#f1f5f9;--shadow:0 1px 3px rgba(15,23,42,.06);--r:13px}
[data-theme="dark"]{--bg:#0f172a;--card:#1e293b;--ink:#f1f5f9;--ink2:#cbd5e1;--muted:#94a3b8;--line:#334155;--chip:#334155;--shadow:0 1px 3px rgba(0,0,0,.3);--green-l:#064e3b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
[dir="rtl"] body{font-family:"Segoe UI",Tahoma,Arial,sans-serif}
.wrap{max-width:700px;margin:0 auto;min-height:100vh}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}

/* Header */
header{background:linear-gradient(135deg,#0f172a,var(--green-d) 60%,#0f172a);color:#fff;padding:20px 16px 16px}
.htop{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.htop h1{font-size:17px;font-weight:800}
.hbtn{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;background:rgba(255,255,255,.12);color:#fff}
.hbtn:hover{background:rgba(255,255,255,.22)}
.hbtn.rose{background:var(--rose)}
.live-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sub{font-size:12px;color:#a7f3d0;margin-top:4px}
.hlinks{display:flex;gap:7px;margin-top:12px;flex-wrap:wrap}
.hlinks a{font-size:12px;font-weight:700;text-decoration:none;color:#022c22;background:var(--gold);padding:7px 14px;border-radius:8px}
.hlinks a.ghost{background:rgba(255,255,255,.12);color:#fff}
.hright{margin-inline-start:auto;display:flex;gap:6px;align-items:center}

/* Dashboard */
.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(95px,1fr));gap:7px;margin-top:14px}
.dcard{background:rgba(255,255,255,.08);border-radius:10px;padding:8px;text-align:center}
.dcard b{font-size:16px;display:block;font-variant-numeric:tabular-nums}
.dcard span{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#a7f3d0}

/* KSA */
.ksa{margin:14px;border-radius:16px;color:#fff;padding:14px;background:linear-gradient(135deg,var(--green),var(--green-d));box-shadow:0 8px 24px rgba(4,120,87,.25)}
.ksa h2{font-size:14px;display:flex;align-items:center;gap:6px}
.ksa .grp{font-size:11px;color:#a7f3d0;margin:2px 0 10px}
.nxt{background:rgba(255,255,255,.1);border-radius:12px;padding:12px;margin-bottom:10px}
.nxt .meta{display:flex;justify-content:space-between;font-size:11px;color:#a7f3d0;flex-wrap:wrap;gap:4px}
.nxt .row{display:flex;align-items:center;gap:8px;font-weight:700;margin:6px 0;flex-wrap:wrap}
.cd{display:flex;gap:12px;margin-top:6px}
.cd div{text-align:center}.cd b{font-size:18px;font-variant-numeric:tabular-nums;display:block}.cd span{font-size:9px;text-transform:uppercase;color:#a7f3d0}
.kr{display:flex;justify-content:space-between;align-items:center;font-size:12px;background:rgba(255,255,255,.06);border-radius:8px;padding:7px 10px;margin-top:6px;gap:6px}
.kr .when{font-size:10px;color:#a7f3d0;text-align:end}

/* Players */
.players{display:flex;gap:8px;margin-top:10px;overflow-x:auto;padding-bottom:4px}
.players::-webkit-scrollbar{display:none}
.plr{background:rgba(255,255,255,.1);border-radius:10px;padding:8px 12px;text-align:center;min-width:100px;flex-shrink:0}
.plr .pn{font-size:11px;font-weight:700}.plr .pp{font-size:10px;color:#a7f3d0}

/* Tabs */
.tabs{position:sticky;top:0;z-index:20;background:var(--bg);display:flex;border-bottom:1px solid var(--line);transition:background .3s}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);transition:all .2s}
.tab.on{color:var(--green);border-bottom:2px solid var(--green)}
.tab:hover{color:var(--ink)}

/* Controls */
.ctrls{padding:10px 14px 6px;background:var(--bg);border-bottom:1px solid var(--line)}
.ctop{display:flex;gap:7px;margin-bottom:7px}
.search{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px;background:var(--card);color:var(--ink);transition:all .3s}
.search:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(4,120,87,.15)}
.tz{border:1px solid var(--line);border-radius:10px;padding:0 6px;font-size:12px;background:var(--card);color:var(--ink)}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;transition:all .2s}
.chip.on{background:var(--green);color:#fff;border-color:var(--green)}
.chip:hover{border-color:var(--green)}

/* Match card */
.sec{padding:8px 14px 30px}
.day-h{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin:16px 0 7px;display:flex;align-items:center;gap:7px}
.day-h .pill{font-weight:700;color:var(--green);background:var(--green-l);font-size:10px;padding:2px 7px;border-radius:999px;text-transform:none}
.mc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:all .2s;position:relative}
.mc:hover{border-color:var(--green);transform:translateY(-1px)}
.mc.hi{border-color:#6ee7b7;background:color-mix(in srgb,var(--green-l) 40%,var(--card))}
.mc .mtop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;gap:4px}
.mc .time{font-size:13px;font-weight:700}.mc .et{font-size:10px;color:var(--muted)}
.mc .venue{font-size:10px;color:var(--muted);text-align:end;display:flex;align-items:center;gap:3px}
.teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:7px}
.tm{display:flex;align-items:center;gap:6px;min-width:0}.tm.aw{justify-content:flex-end}
.tm .fl{font-size:18px;line-height:1}.tm .nm{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tm .nm.ph{color:var(--muted);font-size:12px}
.sc{font-weight:800;font-size:15px;font-variant-numeric:tabular-nums;background:var(--chip);padding:2px 9px;border-radius:7px}
.vs-t{font-size:11px;font-weight:700;color:#94a3b8}
.tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:999px}
.tag.ft{background:var(--chip);color:var(--muted)}.tag.now{background:var(--rose);color:#fff}
.tag.stg{background:#eef2ff;color:#4338ca;font-size:9px}
[data-theme="dark"] .tag.stg{background:#312e81;color:#a5b4fc}
.fav-star{position:absolute;top:8px;right:8px;font-size:16px;opacity:.4;transition:opacity .2s}
[dir="rtl"] .fav-star{right:auto;left:8px}
.fav-star.on{opacity:1}
.notify-btn{font-size:10px;display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:6px;background:var(--chip);color:var(--muted);margin-top:6px;transition:all .2s}
.notify-btn:hover{background:var(--green-l);color:var(--green)}
.notify-btn.set{background:var(--green-l);color:var(--green)}
.poll{margin-top:8px;display:flex;gap:6px}

.poll button:hover{border-color:var(--green)}
.poll button.voted{background:var(--green);color:#fff;border-color:var(--green)}
.poll-bar{height:4px;border-radius:2px;background:var(--line);margin-top:4px;overflow:hidden}
.poll-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}

/* Group standings */
.grp-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.grp-hdr{padding:10px 13px;font-weight:800;font-size:13px;background:var(--chip);border-bottom:1px solid var(--line)}
.grp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.grp-tbl th{text-align:start;padding:6px 10px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--line)}
.grp-tbl td{padding:7px 10px;border-bottom:1px solid var(--line)}

.grp-tbl .tn{font-weight:700;display:flex;align-items:center;gap:6px}

.grp-tbl .pts{font-weight:800;color:var(--green)}

/* Bracket */
.bracket{padding:14px;overflow-x:auto}
.bracket h3{font-size:14px;font-weight:800;margin-bottom:12px;color:var(--ink)}
.brk-round{margin-bottom:20px}
.brk-round h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:8px;letter-spacing:.04em}
.brk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.brk-m{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px;box-shadow:var(--shadow)}
.brk-m .brk-t{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;font-weight:600}
.brk-m .brk-t.w{color:var(--green)}

.brk-m .brk-vs{text-align:center;font-size:10px;color:var(--muted);padding:2px 0}

.myteams{padding:14px}
.myteams h3{font-size:14px;font-weight:800;margin-bottom:10px}
.fav-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.fav-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.fav-card:hover{border-color:var(--green);transform:translateY(-1px)}
.fav-card .ff{font-size:28px}.fav-card .fn{font-size:12px;font-weight:700;margin-top:4px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hdr{padding:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.modal-hdr h3{font-size:16px;font-weight:800;flex:1}
.modal-close{font-size:20px;color:var(--muted);padding:4px 8px;border-radius:8px}
.modal-close:hover{background:var(--chip)}
.modal-body{padding:16px}
.modal-body .info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.modal-body .info-row:last-child{border:none}
.modal-body .info-lbl{color:var(--muted);font-weight:600}
.modal-body .info-val{font-weight:700}

/* Legends & empty */
.empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 10px}
.legend{font-size:11px;color:var(--muted);background:var(--card);border:1px dashed var(--line);border-radius:10px;padding:9px 11px;margin:8px 0}
footer{text-align:center;font-size:11px;color:var(--muted);padding:8px 14px 28px}
footer a{color:var(--green)}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.sec .mc,.grp-card,.brk-m{animation:fadeIn .3s ease-out}
</style>

function dashHTML(){

  const avg=played?((goals/played).toFixed(2)):"0";
  const rem=104-played;
  const finalD=new Date("2026-07-19T20:00:00+01:00");
  const daysLeft=Math.max(0,Math.ceil((finalD.getTime()-Date.now())/864e5));
  const items=[[played,t().played],[goals,t().goals],[avg,t().avgGoal],[rem,t().remaining],[daysLeft,t().daysFinal],[48,t().teams]];
  return items.map(([v,l])=>`<div class="dcard"><b>${v}</b><span>${l}</span></div>`).join("");
}

    <div class="row">🇸🇦 ${tn("Saudi Arabia")} <span class="vs-t" style="color:#a7f3d0">${t().vs}</span> ${tn(opp)} ${FLAGS[opp]||""}
    <span style="margin-inline-start:auto;font-size:10px;color:#a7f3d0">${tc(next.c)}</span></div>${cd}</div>
    ${KSA.map(m=>{const dd=new Date(m.dt),o=m.h==="Saudi Arabia"?m.a:m.h;
      return`<div class="kr"><span>${FLAGS[o]||""} ${t().vs} ${tn(o)}</span><span class="when">${fDay(dd)}<br>${fT(dd)}</span></div>`}).join("")}
    <div style="margin-top:10px;font-size:11px;font-weight:700;color:#a7f3d0">${t().spotlight}</div>
    <div class="players">${pHTML}</div>`;
}

/* ===================== STANDINGS ===================== */
function calcStandings(grp){
  const teams=GROUPS[grp].map(t=>({t,mp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}));
  M.filter(m=>m.g===grp&&m.s).forEach(m=>{
    const[gh,ga]=m.s.split("-").map(Number);
    const ht=teams.find(x=>x.t===m.h),at=teams.find(x=>x.t===m.a);
    if(!ht||!at)return;
    ht.mp++;at.mp++;ht.gf+=gh;ht.ga+=ga;at.gf+=ga;at.ga+=gh;
    if(gh>ga){ht.w++;ht.pts+=3;at.l++}else if(gh<ga){at.w++;at.pts+=3;ht.l++}else{ht.d++;ht.pts+=1;at.d++;at.pts+=1}
  });
  return teams.sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf);
}
function grpHTML(){
  let h="";
  Object.keys(GROUPS).forEach(g=>{
    const st=calcStandings(g);
    h+=`<div class="grp-card"><div class="grp-hdr">${t().grp} ${g}</div>
    <table class="grp-tbl"><thead><tr><th>${t().pos}</th><th>${t().team}</th><th>${t().mp}</th><th>${t().w}</th><th>${t().d}</th><th>${t().l}</th><th>${t().gf}</th><th>${t().ga}</th><th>${t().gd}</th><th>${t().pts}</th></tr></thead><tbody>`;
    st.forEach((r,i)=>{
      const q=i<2?`<span class="q">Q</span>`:"";
      h+=`<tr><td class="pos">${i+1}</td><td><span class="tn" style="cursor:pointer" onclick="showTeam('${r.t}')">${FLAGS[r.t]||""} ${tn(r.t)} ${q}</span></td><td>${r.mp}</td><td>${r.w}</td><td>${r.d}</td><td>${r.l}</td><td>${r.gf}</td><td>${r.ga}</td><td>${r.gf-r.ga}</td><td class="pts">${r.pts}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  });
  return h;
}

/* ===================== BRACKET ===================== */
function brkHTML(){
  let h="";
  const rounds=[{k:"R32",l:t().r32},{k:"R16",l:t().r16},{k:"QF",l:t().qf},{k:"SF",l:t().sf},{k:"3rd",l:t().third},{k:"Final",l:t().final}];
  rounds.forEach(r=>{
    const ms=M.filter(m=>m.g===r.k);if(!ms.length)return;
    h+=`<div class="brk-round"><h4>${r.l}</h4><div class="brk-grid">`;
    ms.forEach(m=>{
      const d=new Date(m.dt);
      h+=`<div class="brk-m"><div class="brk-t">${FLAGS[m.h]||""} ${m.ph?m.h:tn(m.h)} ${m.s?`<b>${m.s.split("-")[0]}</b>`:""}</div>
      <div class="brk-vs">${t().vs}</div>
      <div class="brk-t">${FLAGS[m.a]||""} ${m.ph?m.a:tn(m.a)} ${m.s?`<b>${m.s.split("-")[1]}</b>`:""}</div>
      <div class="brk-dt">${fDay(d)} · ${fT(d)} · ${tc(m.c)}</div></div>`;
    });
    h+=`</div></div>`;
  });
  return `<div class="bracket"><h3>🏆 ${lang==="ar"?"شجرة البطولة":"Tournament Bracket"}</h3>${h}</div>`;
}

/* ===================== MY TEAMS ===================== */
function favHTML(){
  if(!favs.length)return`<div class="myteams"><h3>${t().tabFav}</h3><div class="empty">${t().noFav}</div></div>`;
  let h=`<div class="myteams"><h3>${t().tabFav}</h3><div class="fav-grid">`;
  favs.forEach(tm=>{h+=`<div class="fav-card" onclick="showTeam('${tm}')" role="button" tabindex="0"><div class="ff">${FLAGS[tm]||"⚽"}</div><div class="fn">${tn(tm)}</div></div>`});
  h+=`</div><h3 style="font-size:13px;margin-bottom:8px">${lang==="ar"?"مباريات منتخباتي":"My Teams' Matches"}</h3>`;
  const myM=M.filter(m=>favs.includes(m.h)||favs.includes(m.a));
  myM.forEach(m=>{const d=new Date(m.dt);
    h+=`<div class="mc${(m.h==="Saudi Arabia"||m.a==="Saudi Arabia")?" hi":""}"><div class="mtop"><div><div class="time">${fT(d)}</div><div class="et">${fDay(d)} · <span class="tag stg">${stgL(m.g)}</span></div></div><div class="venue">📍 ${tc(m.c)}</div></div><div class="teams">${tmHTML(m.h,m.ph,0)}${midHTML(m)}${tmHTML(m.a,m.ph,1)}</div></div>`;
  });
  return h+"</div>";
}

/* ===================== SCHEDULE ===================== */
function passes(m){
  if(query){const q=query.toLowerCase();if(!(fuzzy(q,m.h||"")||fuzzy(q,m.a||"")||fuzzy(q,TEAM_AR[m.h]||"")||fuzzy(q,TEAM_AR[m.a]||"")))return false}
  if(filter==="all")return true;if(filter==="today")return dKey(new Date(m.dt))===dKey(new Date());
  if(filter==="ksa")return m.h==="Saudi Arabia"||m.a==="Saudi Arabia";
  if(filter==="ko")return KO_S.includes(m.g);return m.g===filter;
}
function tmHTML(n,ph,aw){
  if(ph)return`<div class="tm${aw?" aw":""}"><span class="nm ph">${n}</span></div>`;
  return`<div class="tm${aw?" aw":""}">${aw?"":`<span class="fl">${FLAGS[n]||"⚽"}</span>`}<span class="nm">${tn(n)}</span>${aw?`<span class="fl">${FLAGS[n]||"⚽"}</span>`:""}</div>`;
}
function midHTML(m){
  if(m.s)return`<span class="sc">${m.s.replace("-"," – ")}</span>`;
  const st=mSt(new Date(m.dt));
  if(st==="now")return`<span class="tag now">${t().liveLbl}</span>`;
  if(st==="ft")return`<span class="tag ft">${t().ft}</span>`;
  return`<span class="vs-t">${t().vs}</span>`;
}
function schHTML(){
  const rows=M.filter(passes);
  if(!rows.length)return`<div class="empty">${t().noMatch}</div>`;
  let h="";if(filter==="ko")h+=`<div class="legend">${t().koLeg}</div>`;
  let last="";const todayK=dKey(new Date());
  rows.forEach((m,idx)=>{const d=new Date(m.dt),dk=dKey(d),id=matchId(m);
    if(dk!==last){last=dk;h+=`<div class="day-h">${fDay(d)}${dk===todayK?` <span class="pill">${t().todayP}</span>`:""}</div>`}
    const isKsa=m.h==="Saudi Arabia"||m.a==="Saudi Arabia";
    const isFav=favs.includes(m.h)||favs.includes(m.a);
    const vn=VENUES[m.c]||"";
    const st=mSt(d);
    let extra="";
    // Notification button
    if(!m.ph&&st==="up")extra+=`<button class="notify-btn${notifs[id]?" set":""}" onclick="event.stopPropagation();setNotif('${id}',M[${M.indexOf(m)}])" aria-label="Set reminder">${notifs[id]?t().reminded:t().remind}</button>`;
    // Poll
    if(!m.ph&&!m.s&&st!=="ft"){
      const v=votes[id];
      extra+=`<div class="poll"><button class="${v==="h"?"voted":""}" onclick="event.stopPropagation();vote('${id}','h')">${FLAGS[m.h]||""} ${tn(m.h)}</button><button class="${v==="d"?"voted":""}" onclick="event.stopPropagation();vote('${id}','d')">🤝 ${t().draw}</button><button class="${v==="a"?"voted":""}" onclick="event.stopPropagation();vote('${id}','a')">${FLAGS[m.a]||""} ${tn(m.a)}</button></div>`;
    }
    h+=`<div class="mc${isKsa?" hi":""}${isFav?" hi":""}" onclick="${m.ph?"":"showTeam('"+m.h+"')"}">
      <span class="fav-star${favs.includes(m.h)||favs.includes(m.a)?" on":""}" onclick="event.stopPropagation();toggleFav('${isKsa?"Saudi Arabia":m.h}')" role="button" tabindex="0" aria-label="Favorite">⭐</span>
      <div class="mtop"><div><div class="time">${fT(d)}</div><div class="et">${fET(d)} ET · <span class="tag stg">${stgL(m.g)}</span></div></div><div class="venue">📍 ${tc(m.c)}${vn?`<br><span style="font-size:9px;color:var(--muted)">${vn}</span>`:""}</div></div>
      <div class="teams">${tmHTML(m.h,m.ph,0)}${midHTML(m)}${tmHTML(m.a,m.ph,1)}</div>
      ${extra}</div>`;
  });
  return h;
}

/* ===================== TEAM MODAL ===================== */
window.showTeam=function(team){
  const info=TEAM_INFO[team]||{};
  const fl=FLAGS[team]||"⚽";
  document.getElementById("modalTitle").innerHTML=`${fl} ${tn(team)}`;
  const grpKey=Object.keys(GROUPS).find(g=>GROUPS[g].includes(team));
  let b="";
  const row=(l,v)=>`<div class="info-row"><span class="info-lbl">${l}</span><span class="info-val">${v}</span></div>`;
  if(grpKey)b+=row(t().grp,grpKey);
  if(info.rank)b+=row(t().rank,info.rank);
  if(info.coach)b+=row(t().coach,info.coach);
  if(info.conf)b+=row(t().conf,info.conf);
  if(info.qual)b+=row(t().qual,info.qual);
  if(info.stars){b+=`<div style="margin-top:12px;font-weight:700;font-size:13px;margin-bottom:6px">${t().keyPlayers}</div>`;
    info.stars.forEach(s=>{b+=`<div style="padding:4px 0;font-size:13px">⭐ ${s}</div>`})}
  // Team matches
  const tm=M.filter(m=>m.h===team||m.a===team);
  if(tm.length){b+=`<div style="margin-top:14px;font-weight:700;font-size:13px;margin-bottom:6px">${lang==="ar"?"المباريات":"Matches"}</div>`;
    tm.forEach(m=>{const d=new Date(m.dt),opp=m.h===team?m.a:m.h;
      b+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:12px"><span>${FLAGS[opp]||""} ${t().vs} ${tn(opp)}</span><span style="color:var(--muted)">${m.s||fT(d)}</span></div>`})}
  const isFav=favs.includes(team);
  b+=`<button onclick="toggleFav('${team}')" style="margin-top:14px;width:100%;padding:10px;border-radius:10px;font-weight:700;font-size:13px;background:${isFav?"var(--rose)":"var(--green)"};color:#fff;border:none;cursor:pointer">${isFav?(lang==="ar"?"❌ إزالة من المفضلة":"❌ Remove from favorites"):(lang==="ar"?"⭐ أضف للمفضلة":"⭐ Add to favorites")}</button>`;
  document.getElementById("modalBody").innerHTML=b;
  document.getElementById("modalBg").classList.add("show");
};
document.getElementById("modalClose").onclick=()=>document.getElementById("modalBg").classList.remove("show");
document.getElementById("modalBg").onclick=e=>{if(e.target===document.getElementById("modalBg"))document.getElementById("modalBg").classList.remove("show")};

/* ===================== RENDER ===================== */
const TABS=[["schedule","tabSch"],["groups","tabGrp"],["bracket","tabBrk"],["favorites","tabFav"]];
const CHIP_K=["all","today","ksa","ko","A","B","C","D","E","F","G","H","I","J","K","L"];

function render(){
  document.documentElement.lang=lang==="ar"?"ar":"en";
  document.documentElement.dir=lang==="ar"?"rtl":"ltr";
  document.documentElement.setAttribute("data-theme",theme);
  // Header
  document.getElementById("t_title").textContent=t().title;
  document.getElementById("t_live").textContent=t().live;
  document.getElementById("t_sub").textContent=t().sub;
  document.getElementById("dashboard").innerHTML=dashHTML();
  document.getElementById("t_scores").textContent=t().scores;
  document.getElementById("t_news").textContent=t().news;
  document.getElementById("langBtn").textContent=t().sw;
  document.getElementById("themeBtn").textContent=theme==="dark"?I[lang].lightM:I[lang].darkM;
  document.getElementById("search").placeholder=t().search;
  document.getElementById("tz_local").textContent=t().local;
  document.getElementById("t_footer").innerHTML=t().footer;
  // Tabs
  document.getElementById("tabBar").innerHTML=TABS.map(([k,l])=>`<button class="tab${tab===k?" on":""}" onclick="tab='${k}';render()" role="tab" aria-selected="${tab===k}">${t()[l]}</button>`).join("");
  // Controls
  document.getElementById("scheduleControls").style.display=tab==="schedule"?"block":"none";
  // Chips
  document.getElementById("chips").innerHTML=CHIP_K.map(k=>{const lbl={all:t().all,today:t().today,ksa:t().ksa,ko:t().ko}[k]||(t().grp+" "+k);
    return`<div class="chip${filter===k?" on":""}" onclick="filter='${k}';renderContent()" role="button" tabindex="0">${lbl}</div>`}).join("");
  renderKSA();renderContent();
}
function renderContent(){
  const el=document.getElementById("content");
  if(tab==="schedule")el.innerHTML=`<div class="sec">${schHTML()}</div>`;
  else if(tab==="groups")el.innerHTML=`<div class="sec">${grpHTML()}</div>`;
  else if(tab==="bracket")el.innerHTML=brkHTML();
  else if(tab==="favorites")el.innerHTML=favHTML();
}

/* ===================== EVENTS ===================== */
document.getElementById("langBtn").onclick=()=>{lang=lang==="en"?"ar":"en";query="";document.getElementById("search").value="";render()};
document.getElementById("themeBtn").onclick=()=>{theme=theme==="dark"?"light":"dark";localStorage.setItem("wc_theme",theme);render()};
document.getElementById("tz").onchange=e=>{tz=e.target.value;render()};
document.getElementById("search").oninput=e=>{query=e.target.value;renderContent()};

// Apply saved theme
if(theme==="dark")document.documentElement.setAttribute("data-theme","dark");
render();

// Efficient countdown: only update countdown numbers
setInterval(()=>{const cd=document.querySelector(".cd");if(cd){const KSA=M.filter(m=>m.h==="Saudi Arabia"||m.a==="Saudi Arabia");
  const now=Date.now(),next=KSA.find(m=>new Date(m.dt).getTime()>now);if(next){const diff=new Date(next.dt).getTime()-now;
  if(diff>0){const bs=cd.querySelectorAll("b");if(bs.length===4){bs[0].textContent=String(Math.floor(diff/864e5)).padStart(2,"0");bs[1].textContent=String(Math.floor(diff%864e5/36e5)).padStart(2,"0");bs[2].textContent=String(Math.floor(diff%36e5/6e4)).padStart(2,"0");bs[3].textContent=String(Math.floor(diff%6e4/1e3)).padStart(2,"0")}}}}},1000);

// Register service worker
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
