name: CI

on:
  push:
    branches: [main, "claude/**"]
    # Score-only commits (scores.json) skip the test suite — they touch no code.
    # GitHub Pages still redeploys them, so live scores reach every visitor fast.
    paths-ignore: ["scores.json"]
  pull_request:

jobs:
  js-unit:
    name: JS unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run test:coverage

  python-unit:
    name: Python unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest
      - run: python -m pytest -q

  e2e:
    name: E2E smoke (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
