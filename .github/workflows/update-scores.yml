name: Update World Cup scores

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch and update scores
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python update_scores.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- scores.json; then
            git config user.name "worldcup-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scores.json
            git commit -m "Auto-update scores [skip ci]"
            git push
          else
            echo "No score changes."
          fi
