name: Update World Cup scores

# GitHub's scheduled Actions are "best-effort" and often fire only every 1-4h
# (not every 10 min), which made results appear hours late. Fix: each run is a
# ~5.5h LOOP that fetches every 60s and commits changes immediately, so once a
# run starts, scores stay fresh to ~1 minute. The schedule just (re)starts the
# loop; cancel-in-progress keeps a single loop alive with minimal gaps.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Live score loop (poll every 60s, commit on change)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          git config user.name "worldcup-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          END=$((SECONDS + 19800))   # run for ~5h30m, safely under the job timeout
          while [ $SECONDS -lt $END ]; do
            python update_scores.py || true
            python update_scorers.py || true
            python update_knockouts.py || true
            if ! git diff --quiet -- scores.json scorers.json knockouts.json; then
              git add scores.json scorers.json knockouts.json
              # No "[skip ci]": we WANT GitHub Pages to redeploy so the same-origin
              # scores.json / scorers.json / knockouts.json refresh for every visitor
              # (even cached/old clients). The test suite (ci.yml) ignores data-only
              # commits via paths-ignore, so this does not run the full suite per goal.
              git commit -m "Auto-update scores, scorers & knockouts" || true
              # absorb any concurrent commits (e.g. PR merges) before pushing
              git pull --rebase --autostash origin main || true
              git push || true
              echo "Pushed score update at $(date -u +%H:%M:%SZ)"
            fi
            sleep 60
          done
